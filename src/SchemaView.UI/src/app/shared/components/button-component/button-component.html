<button
  [type]="type()"
  [disabled]="disabled() || loading()"
  [class]="
    'w-full inline-flex items-center justify-center px-4 py-2.5 font-semibold text-sm rounded-lg transition-all duration-150 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-stone-900 disabled:opacity-50 disabled:cursor-not-allowed ' +
    (variant() === 'primary'
      ? 'bg-primary-600 hover:bg-primary-500 active:bg-primary-700 text-white focus:ring-primary-500'
      : variant() === 'secondary'
        ? 'bg-secondary-800 hover:bg-secondary-700 text-secondary-200 border border-stone-700 focus:ring-stone-500'
        : 'bg-danger-650 hover:bg-danger-550 text-white focus:ring-danger-500')
  "
>
  @if (loading()) {
    <span class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
  } @else {
    {{ label() }}
  }
</button>
