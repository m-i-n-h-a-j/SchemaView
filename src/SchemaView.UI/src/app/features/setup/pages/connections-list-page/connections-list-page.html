<div
  class="min-h-screen bg-surface-container text-color p-4 sm:p-8 font-sans transition-colors duration-200"
>
  <div class="max-w-4xl mx-auto space-y-8">
    <!-- Header -->
    <div
      class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 pb-6 border-b border-outline-variant "
    >
      <div>
        <h1
          class="text-2xl font-bold tracking-tight flex items-center gap-3.5 text-muted-color-emphasis"
        >
          <app-icon-component
            [path]="icons.database"
            [size]="6"
            class="text-primary"
          ></app-icon-component>
          Saved Connections
        </h1>
        <p class="text-sm text-muted-color mt-1">
          Manage and connect to your configured database instances.
        </p>
      </div>
      <div class="flex items-center gap-3">
        <button
          (click)="themeService.toggleTheme()"
          class="flex items-center justify-center w-10 h-10 rounded-lg border border-outline-variant bg-surface-container-low text-muted-color hover:text-muted-color-emphasis hover:bg-surface-container-high transition duration-150 focus:outline-none focus:ring-1 focus:ring-primary"
          [title]="themeService.isDark() ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
        >
          <app-icon-component
            [path]="themeService.isDark() ? icons.light_mode : icons.dark_mode"
            [size]="5"
          ></app-icon-component>
        </button>
        <app-button-component
          label="Add Connection"
          variant="primary"
          (click)="goToAddConnection()"
          class="sm:w-auto"
        ></app-button-component>
      </div>
    </div>

    <!-- Empty State -->
    @if (connectionService.connections().length === 0) {
      <div
        class="flex flex-col items-center justify-center text-center p-12 bg-surface-container-low border border-outline-variant rounded-xl space-y-4 shadow-sm"
      >
        <div
          class="w-16 h-16 bg-surface-container-high border border-outline-variant rounded-2xl flex items-center justify-center"
        >
          <app-icon-component
            [path]="icons.database"
            [size]="8"
            class="text-muted-color"
          ></app-icon-component>
        </div>
        <div class="space-y-1">
          <h3 class="text-lg font-semibold text-muted-color-emphasis">No saved connections</h3>
          <p class="text-sm text-muted-color max-w-sm">
            Get started by creating your first PostgreSQL database connection.
          </p>
        </div>
        <div class="pt-2">
          <app-button-component
            label="Create Connection"
            variant="primary"
            (click)="goToAddConnection()"
          ></app-button-component>
        </div>
      </div>
    } @else {
      <!-- Connection List Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        @for (conn of connectionService.connections(); track conn.id) {
          <app-connection-card
            [conn]="conn"
            (delete)="deleteConnection($event)"
          ></app-connection-card>
        }
      </div>
    }
  </div>

  <app-pop-up-component
    [visible]="popUpService.addDbConnectionPopupVisible()"
    (visibleChange)="popUpService.addDbConnectionPopupVisible.set($event)"
  >
    <div
      class="flex flex-1 min-h-0 overflow-y-auto thin-scrollbar w-[95vw] sm:w-[540px] flex-col p-4 sm:p-6 bg-surface-container-low "
    >
      <app-add-db-component [isCard]="false"></app-add-db-component>
    </div>
  </app-pop-up-component>
</div>
