<div class="bg-surface-0 dark:bg-surface-900 border border-surface-200 dark:border-surface-800 rounded-xl p-5 space-y-4 shadow-sm hover:shadow-md transition duration-200">
  <!-- Connection Header -->
  <div class="flex items-start justify-between">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-surface-100 dark:bg-surface-950 border border-surface-200 dark:border-surface-800 rounded-lg flex items-center justify-center text-primary">
        <app-icon-component [path]="icons.database" [size]="5"></app-icon-component>
      </div>
      <div>
        <h3 class="font-semibold text-muted-color-emphasis text-base leading-tight">
          {{ conn().name }}
        </h3>
        <span class="inline-flex items-center px-2 py-0.5 mt-1 rounded text-[10px] font-medium bg-surface-100 dark:bg-surface-950 text-muted-color border border-surface-200 dark:border-surface-800 uppercase">
          {{ conn().provider }}
        </span>
      </div>
    </div>
    <button
      (click)="onDelete()"
      class="p-1.5 bg-surface-100 dark:bg-surface-950 border border-surface-200 dark:border-surface-800 text-muted-color hover:border-red-500/30 hover:bg-red-500/10 dark:hover:bg-red-950/20 hover:text-red-500 dark:hover:text-red-400 rounded-lg transition-colors duration-150 focus:outline-none cursor-pointer"
      title="Delete Connection"
    >
      <app-icon-component [path]="icons.delete" [size]="4.5"></app-icon-component>
    </button>
  </div>

  <!-- Connection Details -->
  <div class="grid grid-cols-2 gap-y-3 gap-x-4 pt-2 border-t border-surface-100 dark:border-surface-800/60 text-xs">
    <div>
      <span class="block font-medium uppercase tracking-wider mb-0.5 text-muted-color">Host / IP</span>
      <span class="font-mono text-muted-color-emphasis">{{ conn().host }}:{{ conn().port }}</span>
    </div>
    <div>
      <span class="block font-medium uppercase tracking-wider mb-0.5 text-muted-color">Database</span>
      <span class="text-muted-color-emphasis">{{ conn().database }}</span>
    </div>
    <div>
      <span class="block font-medium uppercase tracking-wider mb-0.5 text-muted-color">Username</span>
      <span class="text-muted-color-emphasis">{{ conn().username }}</span>
    </div>
    <div>
      <span class="block font-medium uppercase tracking-wider mb-0.5 text-muted-color">Security</span>
      <span
        class="inline-flex items-center gap-1 mt-0.5 font-medium"
        [class.text-primary]="conn().ssl"
        [class.text-muted-color]="!conn().ssl"
      >
        <app-icon-component
          [path]="conn().ssl ? icons.lock : icons.lock_open"
          [size]="3.5"
        ></app-icon-component>
        {{ conn().ssl ? 'SSL Enabled' : 'No SSL' }}
      </span>
    </div>
  </div>

  <!-- Card Actions -->
  <div class="flex items-center justify-between pt-3 border-t border-surface-100 dark:border-surface-800/60 text-[10px] text-muted-color">
    <span>Added: {{ conn().createdAt | date: 'short' }}</span>
    <button class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-primary hover:bg-primary-hover active:bg-primary-active text-primary-contrast font-semibold text-xs rounded-md transition duration-150 focus:outline-none focus:ring-1 focus:ring-primary cursor-pointer">
      Connect
      <app-icon-component [path]="icons.arrow_forward" [size]="3.5"></app-icon-component>
    </button>
  </div>
</div>
